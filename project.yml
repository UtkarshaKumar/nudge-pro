# Nudge Pro - XcodeGen Project Configuration
# https://github.com/yonicd/xcodegen

name: NudgePro
options:
  bundleIdPrefix: com.nudge
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    # IMPORTANT: Set your Apple Developer Team ID below to fix TCC crashes
    # DEVELOPMENT_TEAM: "YOUR_TEAM_ID_HERE"

fileGroups:
  - Core

targets:
  NudgePro:
    type: application
    platform: macOS
    sources:
      - path: NudgePro
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Core
        excludes:
          - "**/__pycache__"
          - "**/*.pyc"
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nudge.pro2
        PRODUCT_NAME: Nudge Pro
        INFOPLIST_FILE: NudgePro/Info.plist
        CODE_SIGN_ENTITLEMENTS: NudgePro/NudgePro.entitlements
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
    entitlements:
      path: NudgePro/NudgePro.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.cs.allow-unsigned-executable-memory: true
    info:
      path: NudgePro/Info.plist
      properties:
        CFBundleName: Nudge Pro
        CFBundleDisplayName: Nudge Pro
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: $(EXECUTABLE_NAME)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSApplicationCategoryType: public.app-category.productivity
        NSHumanReadableCopyright: "Copyright © 2026 Nudge. All rights reserved."
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        NSSpeechRecognitionUsageDescription: "Nudge Pro uses speech recognition to transcribe your meeting recordings into text for generating notes and action items."
        NSMicrophoneUsageDescription: "Nudge Pro needs microphone access to record audio during your meetings."

schemes:
  NudgePro:
    build:
      targets:
        NudgePro: all
    run:
      config: Debug
    archive:
      config: Release
